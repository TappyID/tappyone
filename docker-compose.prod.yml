version: '3.8'

services:
  # Backend Go API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tappyone-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - WHATSAPP_API_URL=http://waha:3000
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - WEBHOOK_URL=http://backend:8080/api/webhooks/whatsapp
      - BASE_URL=http://backend:8080
      - PORT=8080
      - NODE_ENV=production
    depends_on:
      - waha
    networks:
      - tappyone-network
    volumes:
      - ./uploads:/app/uploads

  # WAHA API (WhatsApp HTTP API)
  waha:
    image: devlikeapro/waha-plus:chrome
    container_name: tappyone-waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WAHA_WEBHOOK_URL=http://backend:8080/api/webhooks/whatsapp
      - WAHA_WEBHOOK_EVENTS=message,message.any,state.change,group.join,presence.update
      - WAHA_LOG_LEVEL=info
      - WAHA_PRINT_QR=true
      - WAHA_SESSION_STORE_TYPE=file
      - WAHA_SESSION_STORE_PATH=/app/sessions
      # TappyOne White Label Configuration
      - WHATSAPP_SWAGGER_TITLE=TappyOne CRM API
      - WHATSAPP_SWAGGER_DESCRIPTION=<p><strong>TappyOne CRM</strong> - Sistema completo de gestão de relacionamento com clientes via WhatsApp.<br/><a href='https://tappyone.vercel.app'>Acesse nossa plataforma</a></p>
      - WHATSAPP_SWAGGER_EXTERNAL_DOC_URL=https://tappyone.vercel.app
      - WHATSAPP_SWAGGER_USERNAME=tappyone
      - WHATSAPP_SWAGGER_PASSWORD=admin2024
      - WAHA_API_KEY=tappyone-secure-api-key-2024
    networks:
      - tappyone-network
    volumes:
      - waha-sessions:/app/sessions
      - waha-files:/app/files

  # Nginx Reverse Proxy (opcional, para SSL)
  nginx:
    image: nginx:alpine
    container_name: tappyone-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - waha
    networks:
      - tappyone-network

networks:
  tappyone-network:
    driver: bridge

volumes:
  waha-sessions:
  waha-files:
