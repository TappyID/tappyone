events {
    worker_connections 1024;
}

http {
    # Upstream para WAHA
    upstream waha {
        server localhost:3000;
    }

    # Redirect HTTP to HTTPS para porta 3000
    server {
        listen 3000;
        server_name server.tappy.id;
        return 301 https://$server_name:3000$request_uri;
    }

    # HTTPS Server para porta 3000 (WAHA)
    server {
        listen 3000 ssl http2;
        server_name server.tappy.id;

        # SSL Configuration
        ssl_certificate /etc/ssl/certs/server.tappy.id.crt;
        ssl_certificate_key /etc/ssl/private/server.tappy.id.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers off;

        # Security Headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # CORS Headers para WAHA API
        add_header Access-Control-Allow-Origin "https://crm.tappy.id" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Api-Key" always;
        add_header Access-Control-Allow-Credentials true always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://crm.tappy.id";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Api-Key";
            add_header Access-Control-Allow-Credentials true;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Proxy para WAHA
        location / {
            proxy_pass http://waha;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # WebSocket support para WAHA
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
