version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8081:8081"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - WAHA_API_URL=http://waha:3000/api
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8081
      - FRONTEND_URL=https://crm.tappy.id
      - DOMAIN=server.tappy.id
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - waha
    networks:
      - tappyone-network

  waha:
    image: devlikeapro/waha-plus:chrome
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=GOWS
      # Media Storage - PostgreSQL
      - WAHA_MEDIA_STORAGE=POSTGRESQL
      - WAHA_MEDIA_POSTGRESQL_URL=${DATABASE_URL}
      - WAHA_API_KEY=tappyone-waha-2024-secretkey
      - WAHA_API_HOSTNAME=0.0.0.0
      - WAHA_API_PORT=3000
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_URL=https://server.tappy.id/dashboard
      - WHATSAPP_HOOK_URL=https://server.tappy.id/webhooks/whatsapp
      - WHATSAPP_HOOK_EVENTS=message,session.status
      - WHATSAPP_SWAGGER_TITLE=TappyOne CRM API
      - WHATSAPP_SWAGGER_DESCRIPTION=<p><strong>TappyOne CRM</strong> - Sistema completo de gestão via WhatsApp.<br/><a href='https://crm.tappy.id'>Acesse nossa plataforma</a></p>
      - WHATSAPP_SWAGGER_EXTERNAL_DOC_URL=https://crm.tappy.id
      - WAHA_AUTO_START_DELAY_SECONDS=1
      - WAHA_PRINT_QR=true
      - WAHA_WORKER_ID=tappyone-server
      - WHATSAPP_RESTART_ALL_SESSIONS=true
    volumes:
      - ./sessions:/app/.sessions
    restart: unless-stopped
    networks:
      - tappyone-network

networks:
  tappyone-network:
    driver: bridge

